<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Study Hub — 모의고사 분석</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="shared.css">
<style>
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 0.85rem;
    margin-bottom: 2rem;
  }
  .summary-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
  }
  .summary-name {
    font-family: var(--font-sans);
    font-size: 0.75rem;
    color: var(--ink-light);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: var(--font-body);
    font-size: 0.88rem;
    padding: 0.2rem 0;
    border-bottom: 1px dashed var(--line-soft);
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .v {
    font-family: var(--font-display);
    font-weight: 500;
    color: var(--navy);
  }

  .mock-item {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 0.85rem;
  }
  .mock-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px dashed var(--line);
  }
  .mock-title {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 1.1rem;
    color: var(--navy);
  }
  .mock-date {
    font-family: var(--font-sans);
    font-size: 0.78rem;
    color: var(--ink-light);
  }
  .mock-stats {
    display: grid;
    grid-template-columns: repeat(3, auto);
    gap: 1.5rem;
    margin: 0.4rem 0 0.75rem;
    font-family: var(--font-sans);
    font-size: 0.82rem;
    color: var(--ink-soft);
  }
  .mock-stat strong {
    display: block;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 1.5rem;
    color: var(--navy);
    line-height: 1.1;
  }
  .mock-stat span {
    font-size: 0.7rem;
    color: var(--ink-light);
  }

  .mock-block {
    margin-top: 0.6rem;
  }
  .mock-block-label {
    font-family: var(--font-sans);
    font-size: 0.72rem;
    color: var(--ink-light);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }
  .mock-block-content {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.65;
    white-space: pre-wrap;
  }
  .weak-block { background: var(--rose-pale); padding: 0.6rem 0.9rem; border-radius: var(--radius); border-left: 3px solid var(--rose); }
  .notes-block { background: var(--violet-pale); padding: 0.6rem 0.9rem; border-radius: var(--radius); border-left: 3px solid var(--violet); }
</style>
</head>
<body>
<nav class="top-nav no-print">
  <a href="index.html" class="brand"><span class="brand-mark"></span>Study Hub</a>
  <div class="nav-links"></div>
</nav>

<main class="container">
  <header class="page-header">
    <div class="page-eyebrow">Mock Exam Analysis</div>
    <h1 class="page-title">모의고사 분석</h1>
    <p class="page-subtitle">시험 결과를 누적 기록하여 점수 추이와 취약 영역을 추적합니다.</p>
  </header>

  <h2 class="section-title" style="font-family: var(--font-display); font-weight: 500; font-size: 1.15rem; color: var(--navy); margin: 0 0 0.85rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--line);">과목별 요약</h2>
  <div class="summary-grid" id="summary"></div>

  <div class="card mb-2 no-print">
    <div class="card-header">
      <div class="card-title">새 모의고사 기록</div>
    </div>
    <div class="form-grid">
      <div class="form-grid form-grid-2">
        <div>
          <label class="label">과목</label>
          <select class="select" id="f-subject"></select>
        </div>
        <div>
          <label class="label">시험명</label>
          <input type="text" class="input" id="f-name" placeholder="예: 2025학년도 3월 학평, EBS 파이널 1회">
        </div>
      </div>
      <div class="form-grid form-grid-2">
        <div>
          <label class="label">응시일</label>
          <input type="date" class="input" id="f-date">
        </div>
        <div>
          <label class="label">등급</label>
          <select class="select" id="f-grade">
            <option value="">선택 안함</option>
            <option>1</option><option>2</option><option>3</option>
            <option>4</option><option>5</option><option>6</option>
            <option>7</option><option>8</option><option>9</option>
          </select>
        </div>
      </div>
      <div class="form-grid form-grid-2">
        <div>
          <label class="label">획득 점수</label>
          <input type="number" class="input" id="f-score" min="0">
        </div>
        <div>
          <label class="label">만점</label>
          <input type="number" class="input" id="f-total" min="1" value="100">
        </div>
      </div>
      <div>
        <label class="label">취약 영역 / 틀린 유형</label>
        <textarea class="textarea" id="f-weak" placeholder="예: 빈칸 추론(31, 34번), 어법 한 문제, 비문학 과학지문 추론"></textarea>
      </div>
      <div>
        <label class="label">총평 / 보완 계획</label>
        <textarea class="textarea" id="f-notes" placeholder="시간 분배, 컨디션, 다음 시험까지 보완할 점"></textarea>
      </div>
      <div>
        <button class="btn btn-primary" onclick="addMock()">+ 기록 추가</button>
      </div>
    </div>
  </div>

  <div class="toolbar no-print">
    <select class="select" id="filter-subject" onchange="render()" style="max-width: 200px;">
      <option value="">전체 과목</option>
    </select>
    <div class="toolbar-spacer"></div>
    <button class="btn" onclick="window.print()">🖶 인쇄/PDF</button>
  </div>

  <div id="list"></div>
</main>

<script src="shared.js"></script>
<script>
  renderNav('mock');

  function populateSelectors() {
    const opts = DATA.subjects.map(s => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('');
    document.getElementById('f-subject').innerHTML = opts;
    document.getElementById('filter-subject').innerHTML = `<option value="">전체 과목</option>` + opts;
  }

  function addMock() {
    const subjectId = document.getElementById('f-subject').value;
    const name = document.getElementById('f-name').value.trim();
    const date = document.getElementById('f-date').value;
    const grade = document.getElementById('f-grade').value;
    const score = document.getElementById('f-score').value;
    const total = document.getElementById('f-total').value || 100;
    const weakAreas = document.getElementById('f-weak').value.trim();
    const notes = document.getElementById('f-notes').value.trim();

    if (!subjectId) { alert('과목을 선택하세요.'); return; }
    if (!name || !date) { alert('시험명과 응시일을 입력하세요.'); return; }

    DATA.mocks.unshift({
      id: newId('m'), subjectId, name, date,
      grade: grade || null,
      score: score === '' ? null : Number(score),
      total: Number(total),
      weakAreas, notes
    });
    commit();
    ['f-name','f-date','f-grade','f-score','f-weak','f-notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-total').value = 100;
    render();
  }

  function removeMock(id) {
    if (!confirm('이 기록을 삭제할까요?')) return;
    DATA.mocks = DATA.mocks.filter(m => m.id !== id);
    commit();
    render();
  }

  function renderSummary() {
    const sumEl = document.getElementById('summary');
    if (DATA.subjects.length === 0) {
      sumEl.innerHTML = '';
      return;
    }
    sumEl.innerHTML = DATA.subjects.map(s => {
      const items = DATA.mocks.filter(m => m.subjectId === s.id)
                              .sort((a, b) => new Date(a.date) - new Date(b.date));
      if (items.length === 0) {
        return `
          <div class="summary-card">
            <div class="summary-name"><span class="subject-dot dot-${s.color}"></span>${escapeHtml(s.name)}</div>
            <div class="text-sm text-muted">기록 없음</div>
          </div>`;
      }
      const latest = items[items.length - 1];
      const avg = (items.reduce((a, m) => a + (m.score != null ? (m.score / m.total * 100) : 0), 0) / items.length);
      const latestPct = latest.score != null ? Math.round(latest.score / latest.total * 100) : null;
      const grades = items.filter(m => m.grade).map(m => Number(m.grade));
      const avgGrade = grades.length ? (grades.reduce((a,b)=>a+b,0) / grades.length).toFixed(1) : null;

      return `
        <div class="summary-card">
          <div class="summary-name"><span class="subject-dot dot-${s.color}"></span>${escapeHtml(s.name)}</div>
          <div class="summary-row"><span>응시 횟수</span><span class="v">${items.length}회</span></div>
          ${latest.grade ? `<div class="summary-row"><span>최근 등급</span><span class="v">${latest.grade}등급</span></div>` : ''}
          ${latestPct !== null ? `<div class="summary-row"><span>최근 점수</span><span class="v">${latest.score}/${latest.total} (${latestPct}%)</span></div>` : ''}
          ${avgGrade ? `<div class="summary-row"><span>평균 등급</span><span class="v">${avgGrade}</span></div>` : ''}
          <div class="summary-row"><span>평균 정답률</span><span class="v">${avg.toFixed(1)}%</span></div>
        </div>`;
    }).join('');
  }

  function renderList() {
    const fsub = document.getElementById('filter-subject').value;
    let items = DATA.mocks;
    if (fsub) items = items.filter(m => m.subjectId === fsub);
    items = [...items].sort((a, b) => new Date(b.date) - new Date(a.date));

    const list = document.getElementById('list');
    if (items.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-mark">·</div>모의고사 기록이 없습니다.</div>`;
      return;
    }
    list.innerHTML = items.map(m => {
      const sub = getSubject(m.subjectId);
      const pct = m.score != null ? Math.round(m.score / m.total * 100) : null;
      return `
        <div class="mock-item">
          <div class="mock-head">
            <div class="flex gap-1" style="align-items: center;">
              <span class="subject-tag tag-${sub ? sub.color : 'navy'}">
                <span class="subject-dot dot-${sub ? sub.color : 'navy'}"></span>
                ${escapeHtml(sub ? sub.name : '기타')}
              </span>
              <span class="mock-title">${escapeHtml(m.name)}</span>
            </div>
            <div class="flex gap-1" style="align-items: center;">
              <span class="mock-date">${m.date}</span>
              <button class="btn btn-sm btn-ghost btn-danger no-print" onclick="removeMock('${m.id}')">×</button>
            </div>
          </div>

          <div class="mock-stats">
            ${m.grade ? `<div class="mock-stat"><strong>${m.grade}</strong><span>등급</span></div>` : ''}
            ${m.score != null ? `<div class="mock-stat"><strong>${m.score}<span style="font-size:0.7em; color:var(--ink-light)">/${m.total}</span></strong><span>점수</span></div>` : ''}
            ${pct !== null ? `<div class="mock-stat"><strong>${pct}<span style="font-size:0.6em">%</span></strong><span>정답률</span></div>` : ''}
          </div>

          ${m.weakAreas ? `
            <div class="mock-block">
              <div class="mock-block-label">취약 영역</div>
              <div class="weak-block mock-block-content">${escapeHtml(m.weakAreas)}</div>
            </div>` : ''}
          ${m.notes ? `
            <div class="mock-block">
              <div class="mock-block-label">총평 / 보완</div>
              <div class="notes-block mock-block-content">${escapeHtml(m.notes)}</div>
            </div>` : ''}
        </div>`;
    }).join('');
  }

  function render() {
    populateSelectors();
    renderSummary();
    renderList();
  }

  // default date to today
  document.getElementById('f-date').value = today();
  render();
</script>
</body>
</html>
