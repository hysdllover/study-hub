<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Study Hub — 대시보드</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="shared.css">
<style>
  /* Dashboard-specific */
  .hero {
    background: linear-gradient(135deg, #3d4f6b 0%, #5a6d8a 100%);
    color: white;
    border-radius: var(--radius-lg);
    padding: 2rem 2.25rem;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -10%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(200,154,160,0.15) 0%, transparent 60%);
  }
  .hero-eyebrow {
    font-family: var(--font-sans);
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 0.6rem;
  }
  .hero-dday-name {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 400;
    opacity: 0.85;
    margin-bottom: 0.3rem;
  }
  .hero-dday {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 3.5rem;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .hero-meta {
    margin-top: 0.5rem;
    font-family: var(--font-sans);
    font-size: 0.85rem;
    opacity: 0.7;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.25rem;
  }
  .stat-label {
    font-family: var(--font-sans);
    font-size: 0.72rem;
    color: var(--ink-light);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .stat-value {
    font-family: var(--font-display);
    font-size: 1.8rem;
    font-weight: 500;
    color: var(--navy);
    line-height: 1;
  }
  .stat-sub {
    font-family: var(--font-sans);
    font-size: 0.75rem;
    color: var(--ink-light);
    margin-top: 0.4rem;
  }

  .tools-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
  }
  .tool-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    text-decoration: none;
    color: var(--ink);
    transition: all 0.2s ease;
    display: block;
    position: relative;
  }
  .tool-card:hover {
    border-color: var(--navy-soft);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(61, 79, 107, 0.08);
  }
  .tool-mark {
    font-family: var(--font-display);
    font-weight: 400;
    font-style: italic;
    font-size: 1.5rem;
    color: var(--navy);
    margin-bottom: 0.6rem;
  }
  .tool-name {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 1.1rem;
    color: var(--navy);
    margin-bottom: 0.3rem;
  }
  .tool-desc {
    font-family: var(--font-sans);
    font-size: 0.82rem;
    color: var(--ink-soft);
    line-height: 1.5;
  }
  .tool-count {
    position: absolute;
    top: 1.2rem;
    right: 1.2rem;
    font-family: var(--font-sans);
    font-size: 0.72rem;
    color: var(--ink-light);
  }

  .section-title {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 1.3rem;
    color: var(--navy);
    margin: 2.5rem 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--line);
  }

  .dday-list { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .dday-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.9rem 1.1rem;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--bg-card);
  }
  .dday-item-name {
    font-family: var(--font-body);
    font-size: 0.95rem;
    color: var(--ink);
  }
  .dday-item-date {
    font-family: var(--font-sans);
    font-size: 0.72rem;
    color: var(--ink-light);
    margin-top: 0.1rem;
  }
  .dday-item-val {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 1.3rem;
    color: var(--navy);
  }
  .dday-item-val.urgent { color: #a85055; }
  .dday-item-val.past { color: var(--ink-light); }

  @media (max-width: 800px) {
    .stat-grid { grid-template-columns: 1fr 1fr; }
    .tools-grid { grid-template-columns: 1fr; }
    .dday-list { grid-template-columns: 1fr; }
    .hero-dday { font-size: 2.5rem; }
  }

  @media print {
    .hero { background: white !important; color: #000 !important; border: 2px solid #000; }
    .hero-dday { color: #000 !important; }
    .tool-card { page-break-inside: avoid; }
  }
</style>
</head>
<body>
<nav class="top-nav no-print">
  <a href="index.html" class="brand"><span class="brand-mark"></span>Study Hub</a>
  <div class="nav-links"></div>
</nav>

<main class="container">
  <div id="hero-mount"></div>

  <div class="stat-grid" id="stats-mount"></div>

  <h2 class="section-title">학습 도구</h2>
  <div class="tools-grid" id="tools-mount"></div>

  <h2 class="section-title">D-day</h2>
  <div class="toolbar no-print">
    <input type="text" id="dday-name" class="input" placeholder="이름 (예: 6월 모의평가)" style="max-width: 260px;">
    <input type="date" id="dday-date" class="input" style="max-width: 180px;">
    <button class="btn btn-primary" onclick="addDday()">추가</button>
    <div class="toolbar-spacer"></div>
    <button class="btn" onclick="exportJSON()">JSON 내보내기</button>
    <label class="btn" style="cursor:pointer;">
      불러오기
      <input type="file" accept=".json" style="display:none" onchange="importJSON(this.files[0])">
    </label>
  </div>
  <div class="dday-list" id="dday-mount"></div>
</main>

<script src="shared.js"></script>
<script>
  renderNav('home');

  function renderHero() {
    const primary = DATA.ddays.find(d => d.pinned) || DATA.ddays[0];
    if (!primary) {
      document.getElementById('hero-mount').innerHTML = `
        <div class="hero">
          <div class="hero-eyebrow">Study Hub</div>
          <div class="hero-dday-name">D-day가 없습니다</div>
          <div class="hero-meta">아래에서 목표 날짜를 추가해 보세요.</div>
        </div>`;
      return;
    }
    const days = daysUntil(primary.date);
    const label = formatDDay(primary.date);
    document.getElementById('hero-mount').innerHTML = `
      <div class="hero">
        <div class="hero-eyebrow">Primary D-day</div>
        <div class="hero-dday-name">${escapeHtml(primary.name)}</div>
        <div class="hero-dday">${label}</div>
        <div class="hero-meta">${primary.date} · ${days >= 0 ? '남음' : '경과'}</div>
      </div>`;
  }

  function renderStats() {
    const unknownCards = DATA.cards.filter(c => !c.known).length;
    const todayCount = DATA.planner.filter(p => p.date === today()).length;
    const todayDone = DATA.planner.filter(p => p.date === today() && p.done).length;
    const wrongUnresolved = DATA.wrongs.filter(w => !w.retry).length;

    const stats = [
      { label: '과목', val: DATA.subjects.length, sub: '등록됨' },
      { label: '오늘 할 일', val: `${todayDone}/${todayCount}`, sub: '완료/전체' },
      { label: '미해결 오답', val: wrongUnresolved, sub: '다시 풀기 필요' },
      { label: '암기 미숙', val: unknownCards, sub: '복습 필요' }
    ];
    document.getElementById('stats-mount').innerHTML = stats.map(s => `
      <div class="stat">
        <div class="stat-label">${s.label}</div>
        <div class="stat-value">${s.val}</div>
        <div class="stat-sub">${s.sub}</div>
      </div>`).join('');
  }

  function renderTools() {
    const tools = [
      { href: 'subjects.html',  mark: 'i', name: '과목 관리',   desc: '학습 과목 추가·편집·삭제',           count: `${DATA.subjects.length}개` },
      { href: 'note.html',      mark: 'ii', name: '개념 정리 노트', desc: '단원별 핵심 개념과 요약 정리',     count: `${DATA.notes.length}편` },
      { href: 'wrong.html',     mark: 'iii', name: '오답 노트',  desc: '틀린 문제와 취약점 분석',           count: `${DATA.wrongs.length}건` },
      { href: 'flashcard.html', mark: 'iv', name: '암기 카드',  desc: '단어·개념·공식 플래시카드',         count: `${DATA.cards.length}장` },
      { href: 'checklist.html', mark: 'v', name: '진도 체크리스트', desc: '학습 진도와 학습량 기록',         count: `${DATA.checklist.filter(c => c.done).length}/${DATA.checklist.length}` },
      { href: 'planner.html',   mark: 'vi', name: '일정 플래너', desc: '일별 학습 계획과 실행 관리',         count: `${DATA.planner.length}건` },
      { href: 'mock.html',      mark: 'vii', name: '모의고사 분석', desc: '성적 추이와 취약 영역 추적',     count: `${DATA.mocks.length}회` }
    ];
    document.getElementById('tools-mount').innerHTML = tools.map(t => `
      <a class="tool-card" href="${t.href}">
        <div class="tool-count">${t.count}</div>
        <div class="tool-mark">${t.mark}</div>
        <div class="tool-name">${t.name}</div>
        <div class="tool-desc">${t.desc}</div>
      </a>`).join('');
  }

  function renderDdays() {
    const sorted = [...DATA.ddays].sort((a, b) => new Date(a.date) - new Date(b.date));
    if (sorted.length === 0) {
      document.getElementById('dday-mount').innerHTML = `
        <div class="empty">
          <div class="empty-mark">·</div>
          등록된 D-day가 없습니다.
        </div>`;
      return;
    }
    document.getElementById('dday-mount').innerHTML = sorted.map(d => {
      const days = daysUntil(d.date);
      const cls = days < 0 ? 'past' : (days <= 30 ? 'urgent' : '');
      return `
        <div class="dday-item">
          <div>
            <div class="dday-item-name">${d.pinned ? '★ ' : ''}${escapeHtml(d.name)}</div>
            <div class="dday-item-date">${d.date}</div>
          </div>
          <div class="flex gap-1" style="align-items:center;">
            <span class="dday-item-val ${cls}">${formatDDay(d.date)}</span>
            <button class="btn btn-sm btn-ghost no-print" onclick="togglePin('${d.id}')" title="대표로 설정">${d.pinned ? '☆' : '★'}</button>
            <button class="btn btn-sm btn-ghost btn-danger no-print" onclick="removeDday('${d.id}')">×</button>
          </div>
        </div>`;
    }).join('');
  }

  function addDday() {
    const name = document.getElementById('dday-name').value.trim();
    const date = document.getElementById('dday-date').value;
    if (!name || !date) { alert('이름과 날짜를 모두 입력해 주세요.'); return; }
    DATA.ddays.push({ id: newId('d'), name, date, pinned: false });
    commit();
    document.getElementById('dday-name').value = '';
    document.getElementById('dday-date').value = '';
    renderDdays(); renderHero();
  }

  function removeDday(id) {
    if (!confirm('이 D-day를 삭제할까요?')) return;
    DATA.ddays = DATA.ddays.filter(d => d.id !== id);
    commit();
    renderDdays(); renderHero();
  }

  function togglePin(id) {
    DATA.ddays.forEach(d => d.pinned = (d.id === id ? !d.pinned : false));
    commit();
    renderDdays(); renderHero();
  }

  renderHero(); renderStats(); renderTools(); renderDdays();
</script>
</body>
</html>
